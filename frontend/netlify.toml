[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# (2026-06-09 聖旨 A — 移除手動 [functions."___netlify-server-handler"] 區塊:
#  原因: 手動指定 runtime = "nodejs18.x" 跟新版 @netlify/plugin-nextjs v5.15.11
#  不相容, AWS Lambda 報 "Invalid AWS Lambda parameters"。
#  修法: 改用全域 [functions] node_bundler = "esbuild", 讓 plugin 自動推斷
#  runtime 與 timeout (free plan 預設 26-30s ceiling)。
#  API route 的 maxDuration 仍由 route.ts `export const maxDuration = 30` 控制。
[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"
  # Worker proxy URL (not a secret — public URL, safe to commit).
  # netlify.toml [build.environment] is the most reliable injection point:
  # Next.js inlines process.env.CLOUDFLARE_WORKER_URL at build time, so
  # dashboard-only env can fail to propagate to the function bundle.
  CLOUDFLARE_WORKER_URL = "https://jiangnan-trip.andy0958338099.workers.dev"
