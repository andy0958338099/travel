[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # Worker proxy URL (not a secret — public URL, safe to commit).
  # netlify.toml [build.environment] is the most reliable injection point:
  # Next.js inlines process.env.CLOUDFLARE_WORKER_URL at build time, so
  # dashboard-only env can fail to propagate to the function bundle.
  CLOUDFLARE_WORKER_URL = "https://jiangnan-trip.andy0958338099.workers.dev"

# (2026-06-08 移除 [functions."___netlify-server-handler"] timeout = 30:
#  聖旨 2026-06-08 — ddfbff2 push 後 Netlify deploy 失敗,AWS Lambda 報
#  "Invalid AWS Lambda parameters"。root cause 是手動 per-function block
#  跟新版 @netlify/plugin-nextjs v5.15.11 / 新版 Netlify runtime 不相容。
#  修法: 移除手動 block,讓 plugin 自動管理 server handler timeout
#  (plugin 會用 free plan 預設值 26-30s ceiling)。
#  API route 的 maxDuration 仍由 route.ts `export const maxDuration = 30` 控制。
