[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # Worker proxy URL (not a secret — public URL, safe to commit).
  # netlify.toml [build.environment] is the most reliable injection point:
  # Next.js inlines process.env.CLOUDFLARE_WORKER_URL at build time, so
  # dashboard-only env can fail to propagate to the function bundle.
  CLOUDFLARE_WORKER_URL = "https://jiangnan-trip.andy0958338099.workers.dev"

# @netlify/plugin-nextjs bundles ALL API routes into one Lambda function
# named "___netlify-server-handler". timeout controls the ceiling.
# (RESTORED from 039dc681 — 6/8 折騰移除後 deploy 一直 error,
#  恢復 039dc681 成功設定)
# 2026-06-15 聖上拍板 🅐: 試 30→60s, USER distributor gpt-image-2-2k 中文最強
#   但 USER Netlify plan 客觀 30s hard limit (60s 設定 deploy 完實測仍 30.9s 502)
#   2026-06-15 立馬還原 30s, 中堂自主決退 gemini-2.5-flash-image + 中文 Overlay 修法 (6-14 拍板 🅐 既有)
[functions."___netlify-server-handler"]
  timeout = 30
