[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # Worker proxy URL (not a secret — public URL, safe to commit).
  # netlify.toml [build.environment] is the most reliable injection point:
  # Next.js inlines process.env.CLOUDFLARE_WORKER_URL at build time, so
  # dashboard-only env can fail to propagate to the function bundle.
  CLOUDFLARE_WORKER_URL = "https://jiangnan-trip.andy0958338099.workers.dev"

# @netlify/plugin-nextjs bundles ALL API routes into one Lambda function
# named "___netlify-server-handler". Setting timeout per-route via
# `api/manga/regenerate-panel` syntax DOES NOT work — must target the
# actual function name from the build log:
#   "Packaging Functions from .netlify/functions-internal directory:
#    - ___netlify-server-handler/___netlify-server-handler.mjs"
#
# Free plan allows up to 26s, but cold start (~2s) + MiniMax (~25s) = ~27s,
# which makes the first request flaky. 30s is the documented free plan ceiling
# for functions in newer Netlify Runtime versions.
[functions."___netlify-server-handler"]
  timeout = 30
